<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@500;700&display=swap');

  body { margin: 0; background: black; overflow: hidden; }
  img {
    position: absolute;
    width: 100vw;
    height: 100vh;
    object-fit: contain;
    transition: opacity 1s ease-in-out;
  }
  #status {
    position: fixed;
    left: 12px;
    bottom: 12px;
    z-index: 99;
    max-width: calc(100vw - 24px);
    padding: 8px 12px;
    border-radius: 8px;
    font-family: Arial, sans-serif;
    font-size: 13px;
    line-height: 1.3;
    color: #fff;
    background: rgba(0, 0, 0, 0.65);
    border: 1px solid rgba(255, 255, 255, 0.2);
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 200ms ease, transform 200ms ease;
    pointer-events: none;
  }
  #status.visible {
    opacity: 1;
    transform: translateY(0);
  }
  #status.ok {
    border-color: rgba(0, 208, 132, 0.7);
  }
  #status.warn {
    border-color: rgba(255, 173, 66, 0.8);
  }
  #status.error {
    border-color: rgba(255, 93, 93, 0.85);
  }
  #clock {
    position: fixed;
    top: 12px;
    right: 12px;
    z-index: 98;
    min-width: 170px;
    padding: 10px 12px 9px;
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    background: linear-gradient(
      135deg,
      rgba(24, 24, 24, 0.55),
      rgba(0, 0, 0, 0.34)
    );
    backdrop-filter: blur(3px);
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.28);
    pointer-events: none;
  }
  #clock.pos-top-right {
    top: 12px;
    right: 12px;
    bottom: auto;
    left: auto;
  }
  #clock.pos-bottom-right {
    top: auto;
    right: 12px;
    bottom: 12px;
    left: auto;
  }
  #clock.no-glass {
    background: rgba(0, 0, 0, 0.42);
    backdrop-filter: none;
    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.22);
  }
  #clock-time {
    display: block;
    font-family: "Manrope", "Segoe UI", sans-serif;
    font-size: 31px;
    font-weight: 700;
    line-height: 1;
    letter-spacing: 0.3px;
    color: rgba(255, 255, 255, 0.96);
    text-shadow: 0 2px 6px rgba(0, 0, 0, 0.55);
  }
  #clock-date {
    display: block;
    margin-top: 5px;
    font-family: "Manrope", "Segoe UI", sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.84);
    text-shadow: 0 1px 3px rgba(0, 0, 0, 0.55);
  }
  #fullscreen-btn {
    position: fixed;
    top: 12px;
    left: 12px;
    z-index: 100;
    padding: 10px 14px;
    border: 1px solid rgba(255, 255, 255, 0.28);
    border-radius: 10px;
    background: rgba(0, 0, 0, 0.5);
    color: rgba(255, 255, 255, 0.95);
    font-family: "Manrope", "Segoe UI", sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.2px;
    cursor: pointer;
    backdrop-filter: blur(2px);
  }
  #fullscreen-btn.hidden {
    display: none;
  }
  #fullscreen-btn:active {
    transform: translateY(1px);
  }
  @media (max-width: 640px) {
    #clock {
      min-width: 148px;
      padding: 9px 10px 8px;
    }
    #clock-time {
      font-size: 26px;
    }
    #clock-date {
      font-size: 11px;
    }
    #fullscreen-btn {
      padding: 9px 12px;
      font-size: 12px;
    }
  }
</style>
</head>
<body>

<img id="img1">
<img id="img2" style="opacity:0">
<div id="status" aria-live="polite"></div>
<div id="clock" aria-label="Current date and time">
  <span id="clock-time"></span>
  <span id="clock-date"></span>
</div>
<button id="fullscreen-btn" type="button" aria-label="Enter fullscreen mode">
  Enter Fullscreen
</button>

<script>
const IMAGE_MANIFEST_URL = "./images.json";

const SETTINGS = {
  clockPosition: "top-right", // "top-right" or "bottom-right"
  clock24h: false,
  clockGlassEffect: true
};

const SLIDE_MS = 8000;
const REFRESH_MS = 30 * 60 * 1000;
const FETCH_TIMEOUT_MS = 60000;
const RANDOM_START_ON_LOAD = true;

let images = [];
let index = 0;
let showingFirst = true;
let isRefreshing = false;
let isTransitioning = false;
let statusHideTimer = null;
let didChooseInitialIndex = false;

const img1 = document.getElementById("img1");
const img2 = document.getElementById("img2");
const statusEl = document.getElementById("status");
const clockEl = document.getElementById("clock");
const clockTimeEl = document.getElementById("clock-time");
const clockDateEl = document.getElementById("clock-date");
const fullscreenBtnEl = document.getElementById("fullscreen-btn");

function getFullscreenElement() {
  return document.fullscreenElement
    || document.webkitFullscreenElement
    || document.msFullscreenElement
    || null;
}

function supportsFullscreenApi() {
  const root = document.documentElement;
  return Boolean(
    root.requestFullscreen
    || root.webkitRequestFullscreen
    || root.msRequestFullscreen
  );
}

function updateFullscreenButtonVisibility() {
  if (!fullscreenBtnEl) return;

  const hideButton = !supportsFullscreenApi() || Boolean(getFullscreenElement());
  fullscreenBtnEl.classList.toggle("hidden", hideButton);
}

async function requestFullscreen() {
  const root = document.documentElement;

  if (!supportsFullscreenApi()) {
    setStatus("Fullscreen not supported in this browser.", "warn");
    updateFullscreenButtonVisibility();
    return;
  }

  try {
    if (root.requestFullscreen) {
      await root.requestFullscreen();
    } else if (root.webkitRequestFullscreen) {
      root.webkitRequestFullscreen();
    } else if (root.msRequestFullscreen) {
      root.msRequestFullscreen();
    }

    setStatus("Fullscreen enabled", "ok");
  } catch (err) {
    console.warn("Fullscreen request failed:", err);
    setStatus("Tap Enter Fullscreen to allow fullscreen mode.", "warn");
  } finally {
    updateFullscreenButtonVisibility();
  }
}

function setupFullscreen() {
  updateFullscreenButtonVisibility();

  if (!supportsFullscreenApi()) {
    setStatus("Fullscreen API unavailable. Use browser fullscreen if possible.", "warn", true);
    return;
  }

  if (fullscreenBtnEl) {
    fullscreenBtnEl.addEventListener("click", requestFullscreen);
  }

  document.addEventListener("fullscreenchange", updateFullscreenButtonVisibility);
  document.addEventListener("webkitfullscreenchange", updateFullscreenButtonVisibility);
  document.addEventListener("msfullscreenchange", updateFullscreenButtonVisibility);
}

function applyClockSettings() {
  if (!clockEl) return;

  const positionClass = SETTINGS.clockPosition === "bottom-right"
    ? "pos-bottom-right"
    : "pos-top-right";

  clockEl.classList.remove("pos-top-right", "pos-bottom-right", "no-glass");
  clockEl.classList.add(positionClass);

  if (!SETTINGS.clockGlassEffect) {
    clockEl.classList.add("no-glass");
  }
}

function setStatus(message, tone = "ok", persist = false) {
  if (!statusEl) return;

  statusEl.textContent = message;
  statusEl.className = "";
  statusEl.classList.add("visible", tone);

  if (statusHideTimer) {
    clearTimeout(statusHideTimer);
    statusHideTimer = null;
  }

  if (!persist) {
    statusHideTimer = setTimeout(() => {
      statusEl.classList.remove("visible");
    }, 5000);
  }
}

function updateClock() {
  if (!clockEl || !clockTimeEl || !clockDateEl) return;
  const now = new Date();
  const dateText = now.toLocaleDateString([], {
    weekday: "short",
    month: "short",
    day: "numeric"
  });
  const timeText = now.toLocaleTimeString([], {
    hour: "numeric",
    minute: "2-digit",
    hour12: !SETTINGS.clock24h
  });
  clockTimeEl.textContent = timeText;
  clockDateEl.textContent = dateText;
}

function shuffle(list) {
  const result = [...list];
  for (let i = result.length - 1; i > 0; i -= 1) {
    const j = Math.floor(Math.random() * (i + 1));
    [result[i], result[j]] = [result[j], result[i]];
  }
  return result;
}

function fetchWithTimeout(url, timeoutMs) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);
  return fetch(url, { signal: controller.signal, cache: "no-cache" })
    .finally(() => clearTimeout(timer));
}

async function registerServiceWorker() {
  if (!("serviceWorker" in navigator)) return;

  try {
    const reg = await navigator.serviceWorker.register("./service-worker.js");
    console.log("Service worker registered:", reg.scope);
  } catch (err) {
    console.warn("Service worker registration failed:", err);
  }
}

function preloadImage(url) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve();
    img.onerror = () => reject(new Error("Image decode failed"));
    img.src = url;
  });
}

async function fetchImages() {
  if (isRefreshing) return;
  isRefreshing = true;

  try {
    const res = await fetchWithTimeout(IMAGE_MANIFEST_URL, FETCH_TIMEOUT_MS);
    if (!res.ok) {
      throw new Error(`Manifest request failed: ${res.status}`);
    }

    const payload = await res.json();
    const nextImages = Array.isArray(payload.images)
      ? payload.images.filter((url) => typeof url === "string" && url.trim().length > 0)
      : [];

    if (nextImages.length > 0) {
      images = shuffle(nextImages);
      if (RANDOM_START_ON_LOAD && !didChooseInitialIndex) {
        index = Math.floor(Math.random() * images.length);
        didChooseInitialIndex = true;
      } else {
        index = index % images.length;
      }
      console.log("Loaded images:", images.length);
    } else {
      console.warn("No images found in manifest.");
      setStatus("No photos found in images.json", "warn");
    }
  } catch (err) {
    console.error("Failed to refresh images:", err);
    setStatus("Refresh failed. Retrying on next cycle.", "error");
  } finally {
    isRefreshing = false;
  }
}

async function showNext() {
  if (isTransitioning || images.length === 0) return;
  isTransitioning = true;

  try {
    const nextUrl = images[index];
    await preloadImage(nextUrl);

    if (showingFirst) {
      img2.src = nextUrl;
      img2.style.opacity = 1;
      img1.style.opacity = 0;
    } else {
      img1.src = nextUrl;
      img1.style.opacity = 1;
      img2.style.opacity = 0;
    }

    showingFirst = !showingFirst;
    index = (index + 1) % images.length;
  } catch (err) {
    console.error("Failed to show image:", err);
    setStatus("Could not display one image. Continuing...", "warn");
  } finally {
    isTransitioning = false;
  }
}

async function start() {
  await registerServiceWorker();
  setupFullscreen();
  applyClockSettings();
  updateClock();
  setInterval(updateClock, 1000);

  await fetchImages();
  await showNext();

  setInterval(showNext, SLIDE_MS);
  setInterval(fetchImages, REFRESH_MS);
}

start();
</script>

</body>
</html>
