<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body { margin: 0; background: black; overflow: hidden; }
  img {
    position: absolute;
    width: 100vw;
    height: 100vh;
    object-fit: contain;
    transition: opacity 1s ease-in-out;
  }
  #status {
    position: fixed;
    left: 12px;
    bottom: 12px;
    z-index: 99;
    max-width: calc(100vw - 24px);
    padding: 8px 12px;
    border-radius: 8px;
    font-family: Arial, sans-serif;
    font-size: 13px;
    line-height: 1.3;
    color: #fff;
    background: rgba(0, 0, 0, 0.65);
    border: 1px solid rgba(255, 255, 255, 0.2);
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 200ms ease, transform 200ms ease;
    pointer-events: none;
  }
  #status.visible {
    opacity: 1;
    transform: translateY(0);
  }
  #status.ok {
    border-color: rgba(0, 208, 132, 0.7);
  }
  #status.warn {
    border-color: rgba(255, 173, 66, 0.8);
  }
  #status.error {
    border-color: rgba(255, 93, 93, 0.85);
  }
  #clock {
    position: fixed;
    top: 12px;
    right: 12px;
    z-index: 98;
    padding: 6px 10px;
    border-radius: 8px;
    font-family: Arial, sans-serif;
    font-size: 18px;
    letter-spacing: 0.4px;
    color: rgba(255, 255, 255, 0.92);
    background: rgba(0, 0, 0, 0.28);
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.75);
    pointer-events: none;
  }
</style>
</head>
<body>

<img id="img1">
<img id="img2" style="opacity:0">
<div id="status" aria-live="polite"></div>
<div id="clock" aria-label="Current time"></div>

<script>
const IMAGE_MANIFEST_URL = "./images.json";

const SLIDE_MS = 8000;
const REFRESH_MS = 30 * 60 * 1000;
const FETCH_TIMEOUT_MS = 60000;

let images = [];
let index = 0;
let showingFirst = true;
let isRefreshing = false;
let isTransitioning = false;
let statusHideTimer = null;

const img1 = document.getElementById("img1");
const img2 = document.getElementById("img2");
const statusEl = document.getElementById("status");
const clockEl = document.getElementById("clock");

function setStatus(message, tone = "ok", persist = false) {
  if (!statusEl) return;

  statusEl.textContent = message;
  statusEl.className = "";
  statusEl.classList.add("visible", tone);

  if (statusHideTimer) {
    clearTimeout(statusHideTimer);
    statusHideTimer = null;
  }

  if (!persist) {
    statusHideTimer = setTimeout(() => {
      statusEl.classList.remove("visible");
    }, 5000);
  }
}

function updateClock() {
  if (!clockEl) return;
  const now = new Date();
  const dateText = now.toLocaleDateString([], {
    weekday: "short",
    month: "short",
    day: "numeric"
  });
  const timeText = now.toLocaleTimeString([], {
    hour: "numeric",
    minute: "2-digit",
    hour12: true
  });
  clockEl.textContent = `${dateText}  ${timeText}`;
}

function shuffle(list) {
  const result = [...list];
  for (let i = result.length - 1; i > 0; i -= 1) {
    const j = Math.floor(Math.random() * (i + 1));
    [result[i], result[j]] = [result[j], result[i]];
  }
  return result;
}

function fetchWithTimeout(url, timeoutMs) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);
  return fetch(url, { signal: controller.signal })
    .finally(() => clearTimeout(timer));
}

function preloadImage(url) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve();
    img.onerror = () => reject(new Error("Image decode failed"));
    img.src = url;
  });
}

async function fetchImages() {
  if (isRefreshing) return;
  isRefreshing = true;

  try {
    const res = await fetchWithTimeout(`${IMAGE_MANIFEST_URL}?t=${Date.now()}`, FETCH_TIMEOUT_MS);
    if (!res.ok) {
      throw new Error(`Manifest request failed: ${res.status}`);
    }

    const payload = await res.json();
    const nextImages = Array.isArray(payload.images)
      ? payload.images.filter((url) => typeof url === "string" && url.trim().length > 0)
      : [];

    if (nextImages.length > 0) {
      images = shuffle(nextImages);
      index = index % images.length;
      console.log("Loaded images:", images.length);
    } else {
      console.warn("No images found in manifest.");
      setStatus("No photos found in images.json", "warn");
    }
  } catch (err) {
    console.error("Failed to refresh images:", err);
    setStatus("Refresh failed. Retrying on next cycle.", "error");
  } finally {
    isRefreshing = false;
  }
}

async function showNext() {
  if (isTransitioning || images.length === 0) return;
  isTransitioning = true;

  try {
    const nextUrl = images[index];
    await preloadImage(nextUrl);

    if (showingFirst) {
      img2.src = nextUrl;
      img2.style.opacity = 1;
      img1.style.opacity = 0;
    } else {
      img1.src = nextUrl;
      img1.style.opacity = 1;
      img2.style.opacity = 0;
    }

    showingFirst = !showingFirst;
    index = (index + 1) % images.length;
  } catch (err) {
    console.error("Failed to show image:", err);
    setStatus("Could not display one image. Continuing...", "warn");
  } finally {
    isTransitioning = false;
  }
}

async function start() {
  updateClock();
  setInterval(updateClock, 1000);

  await fetchImages();
  await showNext();

  setInterval(showNext, SLIDE_MS);
  setInterval(fetchImages, REFRESH_MS);
}

start();
</script>

</body>
</html>
